<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATIN POSTER - FINAL FIX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --gold: #ffb800; 
            --brand-color: #ffb800; 
            --price-color: #ffb800; 
            --card-bg: rgba(10, 10, 20, 0.95); 
            --w-scale: 1; 
            --h-scale: 1; 
            --ticket-bg: #ff0000;
        }
        body { margin: 0; background: #1a1a1a; font-family: 'Khmer OS Battambang', sans-serif; color: white; overflow-x: hidden; }

        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 1999; }
        .menu-overlay.active { display: block; }
        .side-menu { position: fixed; left: -320px; top: 0; width: 300px; height: 100%; background: #000; border-right: 2px solid var(--gold); transition: 0.3s; z-index: 2000; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .side-menu.active { left: 0; }
        .menu-btn { position: fixed; top: 20px; left: 20px; z-index: 2100; color: var(--gold); font-size: 22px; cursor: pointer; background: rgba(0,0,0,0.8); padding: 12px; border-radius: 10px; border: 1px solid var(--gold); }

        .editor { width: 100vw; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 40px 0; overflow: auto; }
        
        .poster-container {
            position: relative;
            transform-origin: top center;
            transform: scale(var(--w-scale), var(--h-scale));
            transition: 0.1s;
        }

        .poster { 
            position: relative; width: 1100px; height: auto; min-height: 400px; padding: 40px; 
            background: radial-gradient(circle at center, #0a1931 0%, #000 100%);
            text-align: center; border: 5px solid #333; overflow: hidden; box-sizing: border-box; padding-bottom: 60px;
        }

        .deco-img { 
            position: absolute; width: 170px; height: 170px; 
            top: 50px; cursor: pointer; z-index: 5; object-fit: contain; 
        }
        /* បង្ខិតរូបចូលក្នុងបន្តិច */
        .deco-left { left: 80px; }
        .deco-right { right: 80px; }

        .brand-header { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 10px; position: relative; z-index: 10; }
        #logoImg { width: 90px; height: 90px; border-radius: 50%; cursor: pointer; border: 2px solid var(--gold); object-fit: contain; }
        #brandName { font-size: 55px; font-weight: 900; color: var(--brand-color); font-style: italic; outline: none; }

        #mainTitle { font-size: 55px; font-weight: bold; margin: 10px 0; outline: none; position: relative; z-index: 10; }
        #subTitle { font-size: 30px; font-weight: bold; margin-bottom: 45px; outline: none; position: relative; z-index: 10; }

        .price-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 15px; margin-bottom: 35px; position: relative; z-index: 10; }
        
        .card { background: var(--card-bg); border: 1.5px solid #444; border-radius: 12px; padding: 22px 5px 15px; position: relative; }
        
        .full-ticket-tag { 
            position: absolute; top: 0; left: 0; 
            background: var(--ticket-bg); color: white; 
            font-size: 10px; padding: 2px 10px; 
            border-bottom-right-radius: 8px; font-weight: bold; outline: none; 
        }
        .full-ticket-tag.hidden { display: none !important; }

        .card-controls { position: absolute; top: -12px; left: 0; width: 100%; display: none; justify-content: center; gap: 10px; z-index: 25; }
        .show-edit .card-controls { display: flex; }
        .toggle-btn, .del-btn { background: #333; color: white; border: 1px solid var(--gold); border-radius: 50%; width: 24px; height: 24px; cursor: pointer; font-size: 10px; }
        .del-btn { border-color: #ff0000; color: #ff0000; }

        .gem-img { width: 65px; height: 65px; object-fit: contain; margin: 5px auto; display: block; cursor: pointer; }
        .price-val { color: var(--price-color); font-weight: bold; font-size: 24px; display: block; outline: none; }
        .gem-count { color: #ccc; font-size: 15px; outline: none; }

        .recom-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; border: 2px solid var(--gold); border-radius: 20px; padding: 30px; background: rgba(255, 184, 0, 0.05); min-height: 100px; }

        .btn-action { width: 100%; padding: 12px; background: #222; color: white; border: 1px solid #444; border-radius: 8px; margin-bottom: 10px; cursor: pointer; font-family: inherit; font-size: 14px; text-align: left; }
        .btn-action i { margin-right: 10px; color: var(--gold); }
        label { font-size: 12px; color: #aaa; display: block; margin-top: 10px; }
        input[type="color"], input[type="range"] { width: 100%; height: 35px; border: none; background: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i> កែសម្រួល</div>
    <div class="menu-overlay" id="overlay" onclick="closeMenu()"></div>

    <div class="side-menu" id="side-menu">
        <h3 style="color:var(--gold); text-align: center; margin-bottom: 20px;">MATIN EDITOR</h3>
        
        <div style="background: #111; padding: 10px; border-radius: 8px; border: 1px solid #333; margin-bottom: 15px;">
            <label style="color:var(--gold); margin:0;">ពង្រីកទទឹង: <span id="wTxt">100%</span></label>
            <input type="range" id="wSlider" min="1" max="1.5" step="0.01" value="1" oninput="applyScale()">
            <label style="color:var(--gold); margin:5px 0 0 0;">បង្រួមបណ្ដោយ: <span id="hTxt">100%</span></label>
            <input type="range" id="hSlider" min="0.3" max="1" step="0.01" value="1" oninput="applyScale()">
        </div>

        <button class="btn-action" onclick="document.getElementById('bgUpload').click()"><i class="fas fa-image"></i> ប្តូររូប Background</button>
        <button class="btn-action" style="color:#ff6666;" onclick="removeBg()"><i class="fas fa-trash"></i> លុប Background</button>

        <hr style="border:0.1px solid #333; margin:15px 0;">

        <label>ពណ៌អក្សរលើគេ (Header):</label>
        <input type="color" id="mainTitleColor" value="#ffffff" oninput="applyColors()">

        <label>ពណ៌ថ្ងៃខែ (Sub Title):</label>
        <input type="color" id="subTitleColor" value="#00d2ff" oninput="applyColors()">

        <label>ពណ៌ឈ្មោះ Brand:</label>
        <input type="color" id="brandColorPicker" value="#ffb800" oninput="applyColors()">

        <label>ពណ៌តម្លៃ ($):</label>
        <input type="color" id="priceColorPicker" value="#ffb800" oninput="applyColors()">

        <label>ពណ៌ Full Ticket (Background):</label>
        <input type="color" id="ticketBgColor" value="#ff0000" oninput="applyColors()">

        <label>ពណ៌ចំនួនពេជ្រ:</label>
        <input type="color" id="gemColor" value="#cccccc" oninput="applyColors()">

        <label>ពណ៌ស៊ុមធំ (Border):</label>
        <input type="color" id="borderColor" value="#333333" oninput="applyColors()">

        <hr style="border:0.1px solid #333; margin:15px 0;">
        <h4 style="color:var(--gold); margin: 5px 0;">ការកំណត់ "កញ្ចប់ណែនាំ"</h4>

        <label>ពណ៌ស៊ុមកញ្ចប់ណែនាំ:</label>
        <input type="color" id="recomBorderColor" value="#ffb800" oninput="applyColors()">

        <label>ពណ៌អក្សរ "កញ្ចប់ណែនាំ":</label>
        <input type="color" id="recomTitleColor" value="#ffb800" oninput="applyColors()">

        <label>ពណ៌ផ្ទៃក្នុងកញ្ចប់ណែនាំ:</label>
        <input type="color" id="recomBgColor" value="rgba(255, 184, 0, 0.05)" oninput="applyColors()">

        <hr style="border:0.1px solid #333; margin:15px 0;">

        <button class="btn-action" onclick="addCard('gridItems')"><i class="fas fa-plus-circle"></i> បន្ថែមប្រអប់តម្លៃ</button>
        <button class="btn-action" onclick="addCard('recomGrid')"><i class="fas fa-star"></i> បន្ថែមកញ្ចប់ណែនាំ</button>

        <div style="margin: 10px 0; background: #111; padding: 10px; border-radius: 8px; border: 1px solid #333;">
            <input type="checkbox" id="hideRecom" onchange="toggleRecomSection(this.checked)"> 
            <label style="display:inline; color: white;">លាក់ "កញ្ចប់ណែនាំ"</label>
        </div>
        
        <div style="margin: 10px 0; background: #111; padding: 10px; border-radius: 8px; border: 1px dashed #444;">
            <input type="checkbox" id="editMode" onchange="toggleEditMode(this.checked)"> 
            <label style="display:inline; color: white;">របៀបកែសម្រួល (បង្ហាញប៊ូតុង)</label>
        </div>

        <button class="btn-action" style="background:var(--gold); color:black; font-weight:bold; height: 50px; text-align:center;" onclick="downloadPoster()">ទាញយករូបភាព</button>
        <button class="btn-action" style="background: #440000; text-align:center;" onclick="clearStorage()">Reset ថ្មីទាំងអស់</button>
    </div>

    <div class="editor">
        <div class="poster-container" id="scaleBox">
            <div class="poster" id="captureArea">
                <img src="https://i.ibb.co/vzS8YyG/diamond-blue.png" class="deco-img deco-left" onclick="changeImg(this)">
                <img src="https://i.ibb.co/vzS8YyG/diamond-blue.png" class="deco-img deco-right" onclick="changeImg(this)">
                
                <div class="brand-header">
                    <img src="https://via.placeholder.com/100" id="logoImg" onclick="changeImg(this)">
                    <div id="brandName" contenteditable="true" oninput="saveData()">MATINTOPUP</div>
                </div>

                <div id="mainTitle" contenteditable="true" oninput="saveData()">កក់ TICKET លើកទី 1</div>
                <div id="subTitle" contenteditable="true" oninput="saveData()">ថ្ងៃទី 1 ខែ 5 ឆ្នាំ 2026</div>

                <div class="price-grid" id="gridItems" oninput="saveData()"></div>

                <div id="recomSection">
                    <div style="display: flex; align-items: center; gap: 15px; margin: 30px 0;">
                        <div class="recom-line" style="flex: 1; height: 2px; background: var(--gold); opacity: 0.5;"></div>
                        <span id="recomTitle" style="color: var(--gold); font-weight: bold; font-size: 28px;" contenteditable="true" oninput="saveData()">កញ្ចប់ណែនាំ</span>
                        <div class="recom-line" style="flex: 1; height: 2px; background: var(--gold); opacity: 0.5;"></div>
                    </div>
                    <div class="recom-container" id="recomGrid" oninput="saveData()"></div>
                </div>

            </div>
        </div>
    </div>

    <input type="file" id="universalPicker" hidden accept="image/*">
    <input type="file" id="bgUpload" hidden accept="image/*" onchange="uploadBg(this)">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        function toggleMenu() {
            const menu = document.getElementById('side-menu');
            menu.classList.contains('active') ? closeMenu() : openMenu();
        }
        function openMenu() {
            document.getElementById('side-menu').classList.add('active');
            document.getElementById('overlay').classList.add('active');
            history.pushState({menuOpen: true}, '');
        }
        function closeMenu() {
            document.getElementById('side-menu').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
            if (history.state && history.state.menuOpen) {
                history.back();
            }
        }

        window.onpopstate = function(event) {
            document.getElementById('side-menu').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
        };

        function applyScale() {
            const w = document.getElementById('wSlider').value;
            const h = document.getElementById('hSlider').value;
            document.documentElement.style.setProperty('--w-scale', w);
            document.documentElement.style.setProperty('--h-scale', h);
            document.getElementById('wTxt').innerText = Math.round(w * 100) + "%";
            document.getElementById('hTxt').innerText = Math.round(h * 100) + "%";
            saveData();
        }

        function applyColors() {
            const colors = {
                main: document.getElementById('mainTitleColor').value,
                sub: document.getElementById('subTitleColor').value,
                brand: document.getElementById('brandColorPicker').value,
                price: document.getElementById('priceColorPicker').value,
                ticketBg: document.getElementById('ticketBgColor').value,
                gem: document.getElementById('gemColor').value,
                border: document.getElementById('borderColor').value,
                recomBorder: document.getElementById('recomBorderColor').value,
                recomTitle: document.getElementById('recomTitleColor').value,
                recomBg: document.getElementById('recomBgColor').value
            };
            document.documentElement.style.setProperty('--brand-color', colors.brand);
            document.documentElement.style.setProperty('--price-color', colors.price);
            document.documentElement.style.setProperty('--ticket-bg', colors.ticketBg);
            
            document.getElementById('captureArea').style.borderColor = colors.border;
            document.getElementById('recomGrid').style.borderColor = colors.recomBorder;
            document.getElementById('recomGrid').style.backgroundColor = colors.recomBg;
            document.getElementById('recomTitle').style.color = colors.recomTitle;
            
            document.getElementById('brandName').style.color = colors.brand;
            document.getElementById('mainTitle').style.color = colors.main;
            document.getElementById('subTitle').style.color = colors.sub;
            
            document.querySelectorAll('.recom-line').forEach(el => el.style.background = colors.recomTitle);
            document.querySelectorAll('.price-val').forEach(el => {
                if(!el.closest('#recomGrid')) el.style.color = colors.price;
            });
            document.querySelectorAll('.gem-count').forEach(el => el.style.color = colors.gem);
            saveData();
        }

        function addCard(containerId, price = "$1.00", gem = "100 Diamonds") {
            const container = document.getElementById(containerId);
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-controls">
                    <button class="toggle-btn" onclick="toggleTicket(this)"><i class="fas fa-eye"></i></button>
                    <button class="del-btn" onclick="this.closest('.card').remove(); saveData();"><i class="fas fa-trash"></i></button>
                </div>
                <div class="full-ticket-tag" contenteditable="true">Full Ticket</div>
                <img src="https://i.ibb.co/Qn6LhM6/gems.png" class="gem-img" onclick="changeImg(this)">
                <span class="price-val" contenteditable="true" oninput="saveData()">${price}</span>
                <span class="gem-count" contenteditable="true" oninput="saveData()">${gem}</span>
            `;
            container.appendChild(card);
            applyColors();
            saveData();
        }

        function toggleTicket(btn) {
            const tag = btn.closest('.card').querySelector('.full-ticket-tag');
            tag.classList.toggle('hidden');
            btn.innerHTML = tag.classList.contains('hidden') ? '<i class="fas fa-eye-slash"></i>' : '<i class="fas fa-eye"></i>';
            saveData();
        }

        function changeImg(el) {
            const picker = document.getElementById('universalPicker');
            picker.value = null; 
            picker.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => { el.src = ev.target.result; saveData(); };
                    reader.readAsDataURL(file);
                }
            };
            picker.click();
        }

        function uploadBg(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    document.getElementById('captureArea').style.background = `url(${ev.target.result}) center/cover`;
                    saveData();
                };
                reader.readAsDataURL(file);
            }
            input.value = null;
        }

        function removeBg() {
            document.getElementById('captureArea').style.background = "radial-gradient(circle at center, #0a1931 0%, #000 100%)";
            saveData();
        }

        function toggleRecomSection(hide) {
            document.getElementById('recomSection').style.display = hide ? 'none' : 'block';
            saveData();
        }

        function toggleEditMode(show) { 
            document.getElementById('captureArea').classList.toggle('show-edit', show); 
        }

        function saveData() {
            const data = {
                grid: document.getElementById('gridItems').innerHTML,
                recom: document.getElementById('recomGrid').innerHTML,
                hideRecom: document.getElementById('hideRecom').checked,
                w: document.getElementById('wSlider').value,
                h: document.getElementById('hSlider').value,
                bg: document.getElementById('captureArea').style.background,
                colors: {
                    main: document.getElementById('mainTitleColor').value,
                    sub: document.getElementById('subTitleColor').value,
                    brand: document.getElementById('brandColorPicker').value,
                    price: document.getElementById('priceColorPicker').value,
                    ticketBg: document.getElementById('ticketBgColor').value,
                    gem: document.getElementById('gemColor').value,
                    border: document.getElementById('borderColor').value,
                    recomBorder: document.getElementById('recomBorderColor').value,
                    recomTitle: document.getElementById('recomTitleColor').value,
                    recomBg: document.getElementById('recomBgColor').value
                },
                decoL: document.querySelector('.deco-left').src,
                decoR: document.querySelector('.deco-right').src,
                brandNameText: document.getElementById('brandName').innerText,
                mainTitleText: document.getElementById('mainTitle').innerText,
                subTitleText: document.getElementById('subTitle').innerText
            };
            localStorage.setItem('matin_poster_final_v11', JSON.stringify(data));
        }

        window.onload = function() {
            const saved = localStorage.getItem('matin_poster_final_v11');
            if (saved) {
                const data = JSON.parse(saved);
                document.getElementById('gridItems').innerHTML = data.grid;
                document.getElementById('recomGrid').innerHTML = data.recom;
                document.getElementById('hideRecom').checked = data.hideRecom;
                toggleRecomSection(data.hideRecom);
                document.getElementById('wSlider').value = data.w;
                document.getElementById('hSlider').value = data.h;
                document.getElementById('captureArea').style.background = data.bg;
                document.getElementById('mainTitleColor').value = data.colors.main;
                document.getElementById('subTitleColor').value = data.colors.sub;
                document.getElementById('brandColorPicker').value = data.colors.brand || "#ffb800";
                document.getElementById('priceColorPicker').value = data.colors.price || "#ffb800";
                document.getElementById('ticketBgColor').value = data.colors.ticketBg;
                document.getElementById('gemColor').value = data.colors.gem;
                document.getElementById('borderColor').value = data.colors.border;
                document.getElementById('recomBorderColor').value = data.colors.recomBorder || "#ffb800";
                document.getElementById('recomTitleColor').value = data.colors.recomTitle || "#ffb800";
                document.getElementById('recomBgColor').value = data.colors.recomBg || "rgba(255, 184, 0, 0.05)";
                document.querySelector('.deco-left').src = data.decoL;
                document.querySelector('.deco-right').src = data.decoR;
                if(data.brandNameText) document.getElementById('brandName').innerText = data.brandNameText;
                if(data.mainTitleText) document.getElementById('mainTitle').innerText = data.mainTitleText;
                if(data.subTitleText) document.getElementById('subTitle').innerText = data.subTitleText;
                applyScale();
            } else {
                for(let i=0; i<12; i++) addCard('gridItems');
                for(let i=0; i<3; i++) addCard('recomGrid');
            }
            applyColors();
        };

        async function downloadPoster() {
            closeMenu();
            toggleEditMode(false);
            const element = document.getElementById('scaleBox');
            const canvas = await html2canvas(element, { useCORS: true, scale: 2 });
            const link = document.createElement('a');
            link.download = 'Matin-Poster-Final.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        function clearStorage() {
            if(confirm("លុបថ្មី?")) { localStorage.removeItem('matin_poster_final_v11'); location.reload(); }
        }
    </script>
</body>
</html>
